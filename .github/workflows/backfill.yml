name: Sharp Signals — Backfill (manual only)

# SCHEDULE DISABLED 2026-07-16 — during the V2 migration. Not deleted; retained for
# reproducibility and future research, and still runnable on demand.
#
# WHY: this workflow existed to re-grade every source weekly so their track records would grow.
# That whole strategy — rank the sources, trust the good ones — has been REJECTED on evidence:
# 11,452 graded picks over two years show the average source returns -0.4% vs the closing line,
# and 0 of 50 survive an out-of-sample test with a multiplicity-corrected bound. Five further
# hypotheses built on the same corpus (venue lag, two-sided arb, CLV, conviction, youth) were
# each measured and rejected. So a weekly automatic re-grade was spending Gemini credits, Blotato
# credits and 6-hour runner slots to refresh the track records of a thesis that is dead — and,
# worse, kept those numbers looking live on a dashboard that should not be trusted.
#
# It is also the wrong default for V2: the corpus is now HYPOTHESIS-GENERATING data only. It may
# suggest an idea; it can never validate one. Validation happens on locked forward predictions.
# An automatic job that keeps re-mining history is exactly the habit the refresh exists to break.
#
# TO RUN IT DELIBERATELY: Actions -> this workflow -> "Run workflow" (optionally set since/until),
# or touch backfill-trigger.txt on main. Both are conscious acts, which is the point.
on:
  # schedule:
  #   - cron: "30 9 * * 1"   # DISABLED: Mondays 09:30 UTC. See the note above.
  workflow_dispatch:
    inputs:
      since:
        description: "Deep-backfill start date YYYY-MM-DD (empty = default Kalshi era). Use for the one-time 24-month historical run."
        required: false
        default: ""
      until:
        description: "Optional end cap YYYY-MM-DD (for a narrow dry-run window)."
        required: false
        default: ""
  push:
    branches: [main]
    paths: ["backfill-trigger.txt"] # touch this file to force a rebuild in the cloud

permissions:
  contents: write

# MUST NOT share a concurrency group with the pipeline. GitHub keeps only ONE pending run
# per group, so the pipeline (every 4h) kept cancelling the queued backfill (rare) before it
# ever started — the backfill silently never ran. Separate groups; the workflows both
# `git pull --rebase` before pushing, so a rare overlap on data/ resolves itself.
concurrency:
  group: sharp-signals-backfill
  cancel-in-progress: false

jobs:
  backfill:
    runs-on: ubuntu-latest
    # The first cold-cache backfill fetches ~300 transcripts. At 90 min it was being killed
    # mid-run by GitHub, so no results were ever committed. 6h is GitHub's hosted-runner max.
    # Later runs are far quicker because transcripts are cached in the repo.
    timeout-minutes: 350
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: "20"

      - name: Rebuild track records
        env:
          GEMINI_API_KEY: ${{ secrets.GEMINI_API_KEY }}
          # Force the cheap model regardless of any stale secret — the deep run is ~2,500 videos.
          EXTRACT_MODEL: ${{ secrets.EXTRACT_MODEL || 'gemini-flash-lite-latest' }}
          TWITTERAPI_KEY: ${{ secrets.TWITTERAPI_KEY }}
          YOUTUBE_API_KEY: ${{ secrets.YOUTUBE_API_KEY }}
          BLOTATO_API_KEY: ${{ secrets.BLOTATO_API_KEY }}
          TELEGRAM_BOT_TOKEN: ${{ secrets.TELEGRAM_BOT_TOKEN }}
          TELEGRAM_CHAT_ID: ${{ secrets.TELEGRAM_CHAT_ID }}
          # Deep historical window (from workflow_dispatch inputs); empty falls back to the default.
          BACKFILL_SINCE: ${{ github.event.inputs.since }}
          BACKFILL_UNTIL: ${{ github.event.inputs.until }}
        # For the one-time deep run (since provided) skip the Twitter harvest: 24 months of tweets
        # would run up the metered twitterapi.io bill, and transcripts supply ~99% of gradeable
        # picks. The weekly default (no since) still harvests Twitter.
        run: node backfill.js ${{ github.event.inputs.since != '' && '--yt-only' || '' }}

      # if: always() is doing real work here. Transcripts cost Blotato credits, and the cache
      # is written to disk as each one arrives. Without this, a job that dies part-way through
      # (abort guard, timeout, crash) skips this step and THROWS AWAY every transcript it just
      # paid for — then re-fetches them all next run. Committing the cache even on failure means
      # a failed run is never wasted money: the next attempt resumes from where it stopped.
      - name: Save track records (and the transcript cache, even on failure)
        if: always()
        run: bash .github/save-data.sh backfill
