name: Sharp Signals — Unified V2

# THE UNIFIED PRODUCTION PIPELINE. One hourly dispatcher decides what work is due for the active card
# (discovery / evidence / forecast / alerts / grade) and runs the SAME tested scripts the manual path
# uses — there is no second, simplified cloud implementation. Missed crons self-heal: the next
# invocation sees the overdue stage and runs it (GitHub cron fires ~14-40% of schedule on a public
# repo, so the dispatcher must not assume a run landed).
on:
  schedule:
    # Every 15 min. GitHub fires only ~14-40% of scheduled runs on a public repo, so MORE windows = more
    # that actually land, tightening the effective cadence toward the loosened per-stage intervals. The
    # dispatcher self-heals and exits fast when nothing is due, so the extra windows are cheap. The truly
    # reliable fix is an EXTERNAL trigger hitting workflow_dispatch (see notes) — this is the in-repo half.
    - cron: "5,20,35,50 * * * *"
  workflow_dispatch:
    inputs:
      force:
        description: "Force a stage (collect | forecast | alerts | grade), or leave blank for the schedule to decide"
        required: false
        default: ""
      dry:
        description: "Dry run — decide stages but execute nothing"
        type: boolean
        default: false

permissions:
  contents: write               # commit sealed forecasts + state back to the repo
  actions: read                 # daily report counts today's workflow runs (gh run list)

concurrency:
  # Its OWN group, separate from the V1 workflows. They write disjoint files (V1: signals/pick-ledger/
  # positions/picks/transcripts; V2: card-evidence/evidence-eval/forecast/attestation/receipts), and
  # save-data.sh rebases before pushing, so a rare overlap merges. cancel-in-progress:false so a
  # forecast run is never killed mid-seal.
  group: sharp-signals-unified
  cancel-in-progress: false

jobs:
  unified:
    runs-on: ubuntu-latest
    timeout-minutes: 45
    steps:
      - uses: actions/checkout@v4
        with: { fetch-depth: 0 }     # full history so save-data.sh can rebase onto origin/main

      - uses: actions/setup-node@v4
        with: { node-version: "20" }

      # Cheap, replaceable computational caches (transcripts, extraction) also live in git, but the
      # Actions cache warms a fresh runner faster on the common no-op hourly run.
      - name: Warm caches
        uses: actions/cache@v4
        with:
          path: |
            data/evidence
            data/transcripts
          key: sharp-caches-${{ github.run_id }}
          restore-keys: sharp-caches-

      - name: Run the unified dispatcher
        env:
          GEMINI_API_KEY: ${{ secrets.GEMINI_API_KEY }}
          EXTRACT_MODEL: ${{ secrets.EXTRACT_MODEL }}
          YOUTUBE_API_KEY: ${{ secrets.YOUTUBE_API_KEY }}
          BLOTATO_API_KEY: ${{ secrets.BLOTATO_API_KEY }}
          TWITTERAPI_KEY: ${{ secrets.TWITTERAPI_KEY }}
          TELEGRAM_BOT_TOKEN: ${{ secrets.TELEGRAM_BOT_TOKEN }}
          TELEGRAM_CHAT_ID: ${{ secrets.TELEGRAM_CHAT_ID }}
          BANKROLL: ${{ vars.BANKROLL }}
          # SHARP_PRODUCTION gates the actual Telegram SEND. It is a repository VARIABLE (not a secret),
          # set only after review. Absent -> the alert path runs in TEST mode and sends nothing.
          SHARP_PRODUCTION: ${{ vars.SHARP_PRODUCTION }}
          EXPLORATION_ENABLED: ${{ vars.EXPLORATION_ENABLED }}
          # FIGHT_INTEL_ENABLED turns on the automated intelligence lifecycle (records + dashboard). In
          # shadow it never sends Telegram; run-intel is invoked WITHOUT --send until it is promoted to
          # production. INTEL_WEB_SEARCH gates the grounded web search — off by default in shadow.
          FIGHT_INTEL_ENABLED: ${{ vars.FIGHT_INTEL_ENABLED }}
          # FIGHT_INTEL_SEND=1 promotes the lifecycle from shadow to production (Telegram on, legacy
          # HUMAN REVIEW send archived). Reversible: unset it to fall back to shadow + the old path.
          FIGHT_INTEL_SEND: ${{ vars.FIGHT_INTEL_SEND }}
          INTEL_WEB_SEARCH: ${{ vars.INTEL_WEB_SEARCH }}
          # Combo Recommendation Engine. COMBO_ENABLED=1 shadows it (records + audit, no Telegram);
          # COMBO_SEND=1 promotes it to production. Reads sealed singles; no order path.
          COMBO_ENABLED: ${{ vars.COMBO_ENABLED }}
          COMBO_SEND: ${{ vars.COMBO_SEND }}
          # Speculative Research Portfolio (isolated experiment). INERT until RESEARCH_ENABLED=1 is set as a
          # repository VARIABLE — dispatch only spawns run-research.js when RESEARCH_ENABLED === "1", and
          # RESEARCH_MODE (OBSERVE|PAPER) decides observe-only vs funded. RESEARCH_EXPLORATION_ENABLED=1 adds
          # the research-only shadow exploration pass. Reads sealed artifacts, writes only its own ledger; no
          # Telegram, no order path, never touches real/paper money.
          RESEARCH_ENABLED: ${{ vars.RESEARCH_ENABLED }}
          RESEARCH_MODE: ${{ vars.RESEARCH_MODE }}
          RESEARCH_EXPLORATION_ENABLED: ${{ vars.RESEARCH_EXPLORATION_ENABLED }}
          # Coverage-gated per-fight YouTube search (opt-in, default off). Searches only bouts the roster
          # leaves under COVERAGE_MIN_ORIGINS independent origins, capped at COVERAGE_MAX_BOUTS per run to
          # protect the shared YouTube quota. Inert until COVERAGE_SEARCH_ENABLED=1 is set as a Variable.
          COVERAGE_SEARCH_ENABLED: ${{ vars.COVERAGE_SEARCH_ENABLED }}
          COVERAGE_MIN_ORIGINS: ${{ vars.COVERAGE_MIN_ORIGINS }}
          COVERAGE_MAX_BOUTS: ${{ vars.COVERAGE_MAX_BOUTS }}
          # Daily System Activity Report — an end-of-day health RECEIPT to Telegram (not a bet). Opt-in +
          # fail-closed: inert until DAILY_REPORT_ENABLED=1 is set as a Variable. REPORT_TZ (default
          # America/New_York) and REPORT_HOUR (default 23) define the calendar day and when it fires; it
          # sends once per that day. GH_TOKEN lets the report count today's workflow runs (needs actions:read).
          DAILY_REPORT_ENABLED: ${{ vars.DAILY_REPORT_ENABLED }}
          REPORT_TZ: ${{ vars.REPORT_TZ }}
          REPORT_HOUR: ${{ vars.REPORT_HOUR }}
          GH_TOKEN: ${{ github.token }}
        run: |
          node dispatch.js \
            ${{ github.event.inputs.force && format('--force={0}', github.event.inputs.force) || '' }} \
            ${{ github.event.inputs.dry == 'true' && '--dry' || '' }}

      # if: always() — sealed forecasts and the alert ledger cost real money / carry real
      # consequences, and are written to disk as they are produced. A run that dies part-way must still
      # commit what it made, or it re-does the paid work and (worse) loses the record of what it sent.
      - name: Persist state (even on failure)
        if: always()
        run: bash .github/save-data.sh unified-v2
