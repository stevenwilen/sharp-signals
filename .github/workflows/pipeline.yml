name: Sharp Signals — Pipeline

# Runs in GitHub's cloud, so it fires whether the laptop is open, closed, or off.
on:
  schedule:
    # Hourly discovery scan. The edge (if any) lives in the gap between a pundit posting and the
    # market catching up, so scanning often is what lets us reach a fresh pick before its line
    # moves. The expensive per-video work (Blotato, Gemini) runs ONCE per video and is cached, so
    # cadence does not multiply it; the tweet harvest is gated to daily in pipeline.js. The repo
    # is PUBLIC, so GitHub-Actions minutes are UNLIMITED — the old "~1,800 of 2,000/mo" budget note
    # was wrong (that cap is for PRIVATE repos). The fast, cheap market re-check lives in the
    # separate watch.yml (*/15) so this scan does not need to run more often than hourly.
    - cron: "0 * * * *"
  workflow_dispatch: {} # run on demand from the Actions tab
  push:
    branches: [main]
    paths: ["trigger.txt"] # touching this file kicks a run (handy for testing)

permissions:
  contents: write # needed to commit the updated data/ back to the repo

concurrency:
  group: sharp-signals # never let two runs collide over data/
  cancel-in-progress: false

jobs:
  pipeline:
    runs-on: ubuntu-latest
    timeout-minutes: 45
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: "20"

      - name: Find live edges
        env:
          GEMINI_API_KEY: ${{ secrets.GEMINI_API_KEY }}
          EXTRACT_MODEL: ${{ secrets.EXTRACT_MODEL }}
          TWITTERAPI_KEY: ${{ secrets.TWITTERAPI_KEY }}
          YOUTUBE_API_KEY: ${{ secrets.YOUTUBE_API_KEY }}
          BLOTATO_API_KEY: ${{ secrets.BLOTATO_API_KEY }}
          TELEGRAM_BOT_TOKEN: ${{ secrets.TELEGRAM_BOT_TOKEN }}
          TELEGRAM_CHAT_ID: ${{ secrets.TELEGRAM_CHAT_ID }}
          BANKROLL: ${{ vars.BANKROLL }}
          # FORCE_HEARTBEAT=1 would ping on EVERY run (6x/day). Left off on purpose:
          # alert fatigue is how you end up ignoring the one message that matters.
          # Signals always alert; "nothing to report" pings once a day (12:00 UTC run).
        run: node pipeline.js

      # if: always() — the SAME lesson the backfill already learned, never applied here.
      # Transcripts and extractions cost real money and are written to disk as they arrive.
      # Without this, a run that dies part-way (timeout on a busy fight week, a crash) skips
      # this step and THROWS AWAY everything it just paid for — then re-buys it 4 hours later,
      # forever, because it can never finish a run to commit the cache.
      - name: Save results (even on failure — the cache is paid for)
        if: always()
        run: bash .github/save-data.sh pipeline
