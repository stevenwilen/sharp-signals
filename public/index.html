<!doctype html>
<html lang="en">
<head>
<meta charset="utf-8" /><meta name="viewport" content="width=device-width, initial-scale=1" />
<title>Sharp Signals</title>
<style>
  :root{--bg:#0b0f14;--card:#141b24;--line:#243040;--fg:#e6edf3;--muted:#8b98a8;--green:#3fb950;--red:#f85149;--gold:#e3b341;--blue:#58a6ff;}
  *{box-sizing:border-box}body{margin:0;background:var(--bg);color:var(--fg);font:14px/1.5 -apple-system,Segoe UI,Roboto,sans-serif}
  header{display:flex;align-items:center;gap:14px;flex-wrap:wrap;padding:18px 24px;border-bottom:1px solid var(--line)}
  h1{font-size:18px;margin:0;font-weight:700}h1 .z{color:var(--gold)}
  .spacer{flex:1}
  button{font:inherit;font-weight:600;border:1px solid var(--line);border-radius:8px;padding:8px 14px;cursor:pointer;background:#1b2430;color:var(--fg)}
  button.primary{background:var(--blue);border-color:var(--blue);color:#04101f}
  main{padding:22px;max-width:1080px;margin:0 auto}
  h2{font-size:13px;text-transform:uppercase;letter-spacing:.05em;color:var(--muted);margin:26px 0 10px}
  .caps{display:flex;gap:8px;flex-wrap:wrap}
  .cap{font-size:12px;padding:4px 10px;border-radius:999px;border:1px solid var(--line)}
  .cap.on{color:var(--green);border-color:var(--green)}.cap.off{color:var(--muted)}
  .sig{background:var(--card);border:1px solid var(--line);border-left:3px solid var(--line);border-radius:10px;padding:14px 16px;margin-bottom:10px}
  .sig.star{border-left-color:var(--gold)}
  .sig .top{display:flex;align-items:baseline;gap:10px;flex-wrap:wrap}
  .pick{font-size:16px;font-weight:700}
  .edge{font-weight:700;color:var(--green)}
  .src{color:var(--muted);font-size:12px}
  .bar{display:flex;height:8px;border-radius:4px;overflow:hidden;margin:8px 0;background:#0c1218}
  .bar .mkt{background:#30475e}.bar .src2{background:var(--gold)}
  .q{color:var(--muted);font-style:italic;font-size:13px;margin-top:4px}
  table{width:100%;border-collapse:collapse;background:var(--card);border:1px solid var(--line);border-radius:10px;overflow:hidden}
  th,td{text-align:left;padding:8px 12px;border-bottom:1px solid var(--line);font-size:13px}
  th{color:var(--muted);font-size:11px;text-transform:uppercase}
  .yes{color:var(--green);font-weight:700}.no{color:var(--muted)}
  .pos{color:var(--green)}.neg{color:var(--red)}
  .empty{color:var(--muted);padding:12px}
</style></head>
<body>
<header>
  <h1>⚡ Sharp <span class="z">Signals</span></h1>
  <span class="src">UFC + Boxing · edge vs the Kalshi line</span>
  <div class="spacer"></div>
  <span class="src" id="freshness">—</span>
</header>
<main>
  <div class="caps" id="caps"></div>

  <h2>Live signals — a trusted voice disagrees with the market</h2>
  <div id="signals"><div class="empty">Loading…</div></div>

  <h2>Source track records — who beats the line</h2>
  <table><thead><tr><th>Source</th><th>Trusted</th><th>ROI vs line</th><th>Shrunk</th><th>Picks</th><th>Hit%</th></tr></thead>
  <tbody id="records"><tr><td colspan="6" class="empty">Loading…</td></tr></tbody></table>
</main>
<script>
const $=(id)=>document.getElementById(id);
const pct=(v)=>v==null?'–':(v*100).toFixed(0)+'%';
// No refresh button on purpose: the runs happen in GitHub's cloud every 4h. The Desktop
// shortcut git-pulls those results before opening this, so closing + reopening = fresh data.
// (A local "refresh" would re-run the pipeline here and burn API/Blotato credits for nothing.)
function ago(iso){
  if(!iso) return 'unknown';
  const m = Math.round((Date.now()-new Date(iso).getTime())/60000);
  if(m<1) return 'just now';
  if(m<60) return m+' min ago';
  const h=Math.round(m/60); if(h<24) return h+'h ago';
  return Math.round(h/24)+'d ago';
}
async function load(){
  let d; try{ d=await (await fetch('/api/data')).json(); }catch(e){ return; }
  const capDefs=[['kalshiMarketReads','Kalshi'],['extractPredictions','Gemini'],['pullTwitter','X/Twitter'],['pullYouTube','YouTube'],['kalshiTrading','Trading']];
  $('caps').innerHTML=capDefs.map(([k,l])=>`<span class="cap ${d.caps[k]?'on':'off'}">${d.caps[k]?'✅':'⛔'} ${l}</span>`).join('');
  $('freshness').textContent = 'data updated ' + ago(d.updatedAt) + ' · close & reopen to sync';

  const sigs=(d.signals||[]);
  const trusted=sigs.filter(s=>s.trusted&&(s.edge||0)>=0.05);
  const research=sigs.filter(s=>!(s.trusted&&(s.edge||0)>=0.05));
  const card=(s,star)=>{
    const mkt=(s.marketProb||0)*100, src=(s.sourceProb||0)*100;
    return `<div class="sig ${star?'star':''}">
      <div class="top"><span class="pick">${star?'⭐ ':''}${s.pick}</span>
      ${s.edge!=null?`<span class="edge">+${(s.edge*100).toFixed(0)} pts</span>`:''}
      <span class="src">${s.source}${s.trusted?'':' · untrusted'} ${s.sourceRoi!=null?'· ROI '+s.sourceRoi:''}</span></div>
      <div class="bar"><div class="mkt" style="width:${mkt}%"></div></div>
      <div class="src">market ${pct(s.marketProb)} → source ${pct(s.sourceProb)} · ${s.market||''}</div>
      ${s.quote?`<div class="q">“${s.quote}”</div>`:''}</div>`;
  };
  $('signals').innerHTML=(trusted.length?trusted.map(s=>card(s,true)).join(''):'<div class="empty">No trusted-voice edges clear the threshold right now.</div>')
    +(research.length?'<h2>Research-only</h2>'+research.map(s=>card(s,false)).join(''):'');

  const recs=(d.graded||[]).sort((a,b)=>(b.shrunkRoi||-9)-(a.shrunkRoi||-9));
  $('records').innerHTML=recs.length?recs.map(g=>`<tr>
    <td>${g.source}</td><td>${g.trusted?'<span class="yes">YES</span>':'<span class="no">–</span>'}</td>
    <td class="${g.roi>=0?'pos':'neg'}">${g.roi==null?'–':(g.roi*100).toFixed(1)+'%'}</td>
    <td class="${g.shrunkRoi>=0?'pos':'neg'}">${g.shrunkRoi==null?'–':(g.shrunkRoi*100).toFixed(1)+'%'}</td>
    <td>${g.n||0}</td><td>${pct(g.hitRate)}</td></tr>`).join(''):'<tr><td colspan="6" class="empty">No graded sources yet — run Demo or add keys.</td></tr>';
}
load(); setInterval(load, 8000);
</script>
</body></html>
